<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коммунисты против... Плесени! - V 1.0.18</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>Коммунисты против... Плесени!</h1>
      <span class="version-badge">V 1.0.18</span>
    </header>
    <canvas id="game" width="1024" height="576"></canvas>
    <footer class="controls">
      <span><b>A/D</b> или <b>Ф/В</b> - ходьба</span>
      <span><b>↑/W/Ц</b> - прыжок</span>
      <span><b>↓/S/Ы</b> - спуститься через платформу / целиться вниз</span>
      <span><b>Shift</b> - турбо</span>
      <span><b>F/А</b> - стоп-время</span>
      <span><b>ЛКМ/J/О</b> - атака</span>
      <span><b>E/У</b> - открыть / выкачивать время</span>
      <span><b>Q/Й</b> - оружие</span>
      <span><b>I/Ш</b> - инвентарь</span>
      <span><b>R/К</b> - рестарт</span>
    </footer>
  </main>
  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/player.js"></script>
  <script src="js/world.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
